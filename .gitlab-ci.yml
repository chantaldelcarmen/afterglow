# eslint is allowed to fail but will give warnings
eslint-backend-job:   # This job also runs in the test stage in parallel with e2e testing
  stage: test
  pull_policy: if-not-present
  dependencies: []
  script:
    - cd backend/api
    - npm ci
    - npx eslint .
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push'
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'


deploy-job:      # This job runs in the deploy stage, using artifacts from frontend + backend builds
  stage: deploy 
  environment: production
  needs:
    - job: build-backend-job
      optional: true
    - job: build-frontend-job
      optional: true
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
    - when: never
