stages:          # List of stages for jobs, and their order of execution
  - build
  - test
  - deploy


default:
  cache:
    key:
      files:
        - 'backend/api/package-lock.json'
    paths:
      - 'backend/api/node_modules/'


build-job:       # This job runs in the build stage, which runs first to make nestjs backend runs
  stage: build
  image: node:22-alpine
  script:
    - cd backend/api
    - npm ci
    - npm run build
  artifacts:
    paths:
      - 'backend/api/dist'
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push'
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'


unit-tests-job:   # This job runs in the test stage (unit tests in backend/api/src)
  stage: test   
  image: node:22-alpine
  script:
    - cd backend/api
    - npm ci
    - npm run test
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'


e2e-tests-job:    # runs e2e tests in backend/api/test
  stage: test
  image: node:22-alpine
  script:
    - cd backend/api
    - npm ci
    - npm run test:e2e
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'


