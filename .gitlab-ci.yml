# eslint is allowed to fail but will give warnings
eslint-job:   # This job also runs in the test stage in parallel with e2e testing
  stage: test    
  image: node:22-alpine
  dependencies: []
  script:
    - cd backend/api
    - npm ci
    - npx eslint .
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push'
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'


deploy-job:      # This job runs in the deploy stage.
  stage: deploy 
  environment: production
  needs: [build-job]
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
