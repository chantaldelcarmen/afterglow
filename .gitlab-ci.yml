stages:          # List of stages for jobs, and their order of execution
  - build
  - test
  - deploy


default:
  image: node:22-alpine
  cache:
    key:
      files:
        - 'backend/api/package-lock.json'
    paths:
      - 'backend/api/node_modules/'


build-backend-job:       # This job runs in the build stage, which runs when any non-doc changes happen in backend
  stage: build
  pull_policy: if-not-present
  script:
    - cd backend/api
    - npm ci
    - npm run build
  artifacts:
    paths:
      - 'backend/api/dist'
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push'
      changes:
        - 'backend/**/*'
        - '!backend/**/*.md'      # exclude any doc changes in backend
        - '!backend/**/README*'
      when: on_success
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes:
        - 'backend/**/*'
        - '!backend/**/*.md'   # exclude any doc changes in backend
        - '!backend/**/README*'
      when: on_success
    - when: never


build-frontend-job:     # This job runs in build stage, when any non-doc changes happen in the frontend
  stage: build
  pull_policy: if-not-present
  script:
    - cd frontend
    - npm ci
    - npm run build
  cache:
    key:
      files:
        - 'frontend/package-lock.json'
    paths:
      - 'frontend/node_modules/'
  artifacts:
    paths:
      - 'frontend/dist'
  rules:
    - if: $CI_PIPELINE_SOURCE == 'push'
      changes:
        - 'frontend/**/*'
        - '!frontend/**/*.md'   # exclude any doc changes in frontend
        - '!frontend/**/README*'
      when: on_success
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes:
        - 'frontend/**/*'
        - '!frontend/**/*.md'   # exclude any doc changes in frontend
        - '!frontend/**/README*'
      when: on_success
    - when: never


unit-tests-job:   # This job runs in the test stage (unit tests in backend/api/src)
  stage: test
  pull_policy: if-not-present
  script:
    - cd backend/api
    - npm ci
    - npm run test
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'


e2e-tests-job:    # runs e2e tests in backend/api/test
  stage: test
  pull_policy: if-not-present
  script:
    - cd backend/api
    - npm ci
    - npm run test:e2e
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'


