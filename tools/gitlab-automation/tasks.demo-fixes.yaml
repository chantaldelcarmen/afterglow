  - title: "[Testing] e2e reflections ownership test uses wrong token in description"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::high"
      - "type::bug"
      - "area::testing"
    description: |
      In e2e/security/api-bypass.spec.ts at line 185, the test description says
      "with User Bs JWT" but the call uses tokenA. The test always passes because
      it is testing that the owner can read their own data, not that user B is
      blocked. The description is misleading and the test does not verify what it claims.

      File: e2e/security/api-bypass.spec.ts:185

      Fix
      - Update the description to match what the test actually does, e.g.
        "Call GET /experiences/:id/reflections with the owning user's JWT - confirm 200"

      Tests to verify
      - [ ] Run the e2e suite and confirm the corrected test passes
      - [ ] Confirm the test description accurately reflects the token being used

  # -----------------------------------------------------------------------
  # DATABASE / SEED
  # -----------------------------------------------------------------------

  - title: "[Database] Add video fragments to seed and rerun"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::critical"
      - "type::task"
      - "area::database"
    description: |
      The seed only uploads photo and text fragments. Video fragments need to be
      included so the relive flow, fragment gallery, and video rendering fix can
      all be validated against real data. The backend already supports video
      fragments (type: 'video', storage_path pointing to an mp4).

      Use short free-license clips from Pexels Videos, Pixabay Videos, or Coverr.
      Target clips under 10 seconds and under 5 MB to keep the seeder fast.

      File: backend/supabase/seed.ts

      Implementation
      - Add an uploadVideo helper alongside uploadPhoto that:
          - Fetches the mp4 from a direct download URL
          - Uploads to Supabase storage with contentType: 'video/mp4' and a .mp4 path
          - Inserts a fragment row with type: 'video'
      - Add a videoFragments param to createExperience (same pattern as additionalImages)
      - Attach 1-2 video clips to at least one experience per demo user so the
        relive flow has mixed media to work with
      - Reset and rerun the seed after changes are in:
          docker cp backend/supabase/seed.ts <api-container>:/app/seed.ts
          docker exec <api-container> npx tsx seed.ts

      Note: fix the video rendering bug in ReliveExperience FragmentCard before
      reseeding so videos can be verified end to end in the relive flow.

      Tests to verify
      - [ ] Run the seed without errors
      - [ ] Open the experience detail page for a seeded experience and confirm
            video fragments appear in the fragment gallery
      - [ ] Confirm the video plays inline in the gallery (VideoUpload renders a <video> tag)
      - [ ] Open the relive flow for an experience with a video fragment and confirm
            it renders rather than showing a blank placeholder
      - [ ] Confirm photo and text fragments in the same experience are unaffected

  - title: "[Testing] e2e reflections PATCH and DELETE tests pass vacuously when refIdA is null"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::high"
      - "type::bug"
      - "area::testing"
    description: |
      In e2e/security/api-bypass.spec.ts the refIdA variable is populated from the
      first reflection belonging to user A. If user A has no seeded reflections,
      refIdA is null. The PATCH and DELETE ownership tests at lines 203 and 209 then
      hit .../reflections/null which returns 404, satisfying [403, 404] and passing
      vacuously without testing ownership enforcement at all.

      File: e2e/security/api-bypass.spec.ts:79-80, 203, 209

      Fix option A: Seed a known reflection for user A in beforeAll so refIdA is
      always populated
      Fix option B: Add a guard that skips the test with a clear message when
      refIdA is null so the failure is visible instead of silently passing

      Tests to verify
      - [ ] Run the suite with no pre-existing reflections for user A and confirm
            the tests either skip with a message or use the seeded reflection
      - [ ] Confirm the PATCH and DELETE tests correctly return 403 or 404 when
            user B tries to access user A's reflection
