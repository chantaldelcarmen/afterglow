  - title: "[Frontend] Implement text fragment upload on Upload page"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::critical"
      - "type::task"
      - "area::frontend"
    description: |
      The Upload page currently shows a "Text fragments coming soon" placeholder.
      The backend already supports text fragments (text_context field in AttachFragmentDto,
      text in the fragment type enum).

      Files:
      - frontend/src/lib/storage.ts
      - frontend/src/pages/Upload.tsx
      - new: frontend/src/components/TextUpload.tsx

      Implementation
      - Add uploadTextFragment(experienceId, text, caption?) to storage.ts
        sending a JSON POST (no FormData) with { type: 'text', text_context, caption }
      - Build a TextUpload component with a textarea for the text content,
        an optional caption input, and an Upload button matching the PhotoUpload style
      - Replace the "coming soon" placeholder in Upload.tsx with TextUpload

      Tests to verify
      - [ ] Select the text fragment type on the upload page
      - [ ] Enter text content and an optional caption
      - [ ] Submit and confirm the fragment appears in the gallery below
      - [ ] Open the experience detail page and confirm the text fragment is visible
      - [ ] Relive the experience and confirm the text fragment renders in the cinematic view
      - [ ] Confirm an empty text field cannot be submitted

  - title: "[Frontend] Add leave confirmation on Upload page when fragments exist"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::critical"
      - "type::task"
      - "area::frontend"
    description: |
      Pressing back on the Upload page after uploading fragments navigates away with
      no warning. The user has no way to recover the experience or know it still exists.

      File: frontend/src/pages/Upload.tsx

      Fix
      - Use useBlocker from React Router v6 to intercept navigation when fragments.length > 0
      - Show a confirmation modal with Leave and Stay actions
      - Allow navigation freely when no fragments have been uploaded yet

      Tests to verify
      - [ ] Upload at least one fragment then press the back button
      - [ ] Confirm a confirmation modal appears
      - [ ] Confirm Stay keeps the user on the upload page with fragments intact
      - [ ] Confirm Leave navigates away
      - [ ] Confirm no modal appears when pressing back before uploading any fragments

  - title: "[Frontend] Add inline validation feedback on Create and Edit Experience forms"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::critical"
      - "type::task"
      - "area::frontend"
    description: |
      The Create and Edit Experience forms disable the submit button when title or date
