  - title: "[Frontend] EditExperience missing unsaved changes warning on Cancel"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::high"
      - "type::task"
      - "area::frontend"
    description: |
      The Cancel button and back button in EditExperience call navigate(-1) with no
