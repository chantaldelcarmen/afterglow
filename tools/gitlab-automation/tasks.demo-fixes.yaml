      - Tapping the overlay should collapse the fan (same as tapping the plus button)
      - Combine both effects for a layered depth look consistent with the glass aesthetic

      Tests to verify
      - [ ] Tap the plus button to expand the orbs
      - [ ] Confirm a dark overlay appears over the scroll content behind the orbs
      - [ ] Confirm a blur effect is visible behind the orb cluster
      - [ ] Confirm tapping the overlay collapses the fan
