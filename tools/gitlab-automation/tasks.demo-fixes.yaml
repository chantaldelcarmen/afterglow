  - title: "[Frontend] Video fragments not rendered in ReliveExperience"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::critical"
      - "type::bug"
      - "area::frontend"
    description: |
      FragmentCard in ReliveExperience.tsx handles text and falls through to an
      <img> tag for everything else. Video fragments have no <video> element so
      they render as a blank placeholder with only the type name as text.

      File: frontend/src/pages/ReliveExperience.tsx — FragmentCard component

      Fix
      - Add a <video> branch in FragmentCard for fragments where type === 'video'
      - Use the existing signedUrl as the src
      - Should match the full-bleed style of the image case (absolute inset, object-cover)

      Tests to verify
      - [ ] Seed or upload a video fragment to an experience
      - [ ] Open the relive flow for that experience
      - [ ] Confirm the video renders and plays during the context or peak phase
      - [ ] Confirm pause/resume still works with a video fragment active
      - [ ] Confirm non-video fragments are unaffected

  - title: "[Frontend] Reflection save failure is silent in ReliveExperience"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::critical"
      - "type::bug"
      - "area::frontend"
    description: |
      In ReliveExperience.tsx the handleSaveReflection catch block only calls
      setSaving(false) with no user-facing error message. If saving fails the user
      sees nothing and has no idea what happened.

      File: frontend/src/pages/ReliveExperience.tsx — handleSaveReflection

      Note: feat/128-graceful-error-recovery adds a saveError state that fixes this,
      but saveError is declared at 0 indentation mid-function rather than at the top
      with other state. Move it to the state block at the top when merging.

      Fix
      - Add a saveError state at the top of the component with other useState calls
      - Set it in the catch block with a user-friendly message
      - Render it near the Save Reflection button in the afterglow phase

      Tests to verify
      - [ ] Disconnect from the network (or use DevTools to block the API)
      - [ ] Complete the relive flow and attempt to save a reflection
      - [ ] Confirm an error message appears near the save button
      - [ ] Confirm the textarea and buttons remain usable after the error
      - [ ] Confirm a successful save on reconnect still shows the saved popup and navigates

  - title: "[Frontend] Home featured card and Recently Relived include draft experiences"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::critical"
      - "type::bug"
      - "area::frontend"
    description: |
      Home.tsx uses experiences[0] for the featured hero card and experiences.slice(1, 3)
      for Recently Relived without filtering out drafts. A draft can appear as the
      featured memory with a Relive Now button even though it has no anchor fragment.

      File: frontend/src/pages/Home.tsx

      Fix
      - Filter out is_draft === true experiences before assigning featured and recent
      - Handle the case where there are no published experiences (show empty hero state)

      Tests to verify
      - [ ] Create a draft experience and confirm it does not appear as the featured card
      - [ ] Create a draft experience and confirm it does not appear in Recently Relived
      - [ ] Publish an experience and confirm it appears correctly in both sections
      - [ ] With only drafts in the account, confirm the empty hero state renders correctly

  - title: "[Frontend] Relive button not blocked on draft experiences"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::critical"
      - "type::bug"
      - "area::frontend"
    description: |
      ExperienceDetail.tsx renders the Relive button regardless of experience.is_draft.
      Tapping Relive on a draft with no anchor fragment results in a broken relive flow
      that skips straight to afterglow with no fragments shown.

      File: frontend/src/pages/ExperienceDetail.tsx

      Fix
      - Disable or hide the Relive button when experience.is_draft is true
      - Show a short explanation such as "Set an anchor fragment to relive this memory"

      Tests to verify
      - [ ] Open a draft experience and confirm the Relive button is absent or disabled
      - [ ] Confirm the explanation message is visible
      - [ ] Publish the experience (set anchor, is_draft false) and confirm Relive becomes active
      - [ ] Confirm the relive flow loads correctly after publishing

  - title: "[Frontend] Broken photo preview when switching fragment types on Upload page"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::critical"
      - "type::bug"
      - "area::frontend"
    description: |
      PhotoUpload.tsx creates a blob URL via URL.createObjectURL and revokes it in a
      useEffect cleanup. When the user switches from photo to video and back to photo,
      PhotoUpload unmounts and remounts. On remount the file still exists in the draft
      context but the blob URL has been revoked, so the preview renders a broken image.

      File: frontend/src/components/PhotoUpload.tsx

      Fix
      - Remove the URL.revokeObjectURL call from the useEffect cleanup
      - Only revoke the blob URL when the draft itself is cleared (setPhotoDraft(EMPTY_PHOTO_DRAFT))

      Tests to verify
      - [ ] Select a photo on the upload page
      - [ ] Switch to the video type button
      - [ ] Switch back to the photo type button
      - [ ] Confirm the photo preview still shows the selected image without breaking
      - [ ] Confirm the blob URL is eventually cleaned up after uploading or cancelling

  - title: "[Frontend] Anchor fragment shows delete button in FragmentGallery"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::critical"
      - "type::bug"
      - "area::frontend"
    description: |
      FragmentGallery renders the delete trash icon on every fragment including the
      anchor. The backend rejects anchor deletion with 400 so no data is corrupted,
      but the user sees the button, confirms deletion, and gets an error with the
      confirmation modal still open and no error message visible inside it (the error
      renders outside the modal overlay).

      Files:
      - frontend/src/components/FragmentGallery.tsx
      - frontend/src/pages/ExperienceDetail.tsx

      Fix
      - Pass experience.anchor_fragment_id down to FragmentGallery as a new prop anchorFragmentId
      - In FragmentGallery, hide the trash button when f.id === anchorFragmentId

      Tests to verify
      - [ ] Open an experience with an anchor fragment set
      - [ ] Confirm the trash icon does not appear on the anchor fragment
      - [ ] Confirm the trash icon does appear on non-anchor fragments
      - [ ] Delete a non-anchor fragment and confirm it is removed from the gallery
      - [ ] Confirm the anchor fragment is still visible after other fragments are deleted

  - title: "[Frontend] Date fields allow future dates on Create and Edit Experience"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::critical"
      - "type::bug"
      - "area::frontend"
    description: |
      The date input on CreateExperience.tsx and EditExperience.tsx has no max
      attribute, so users can select future dates. Afterglow is a memory log so
      only past and current dates should be selectable.

      Files:
      - frontend/src/pages/CreateExperience.tsx
      - frontend/src/pages/EditExperience.tsx

      Fix
      - Add max={new Date().toISOString().split('T')[0]} to both date inputs

      Tests to verify
      - [ ] Open Create Experience and confirm dates after today are not selectable
      - [ ] Open Edit Experience and confirm dates after today are not selectable
      - [ ] Confirm today is selectable
      - [ ] Confirm yesterday and earlier are selectable

  - title: "[Frontend] ExperienceLibrary shows drafts with no visual distinction"
    assignee: "chantal"
    labels:
      - "status::ready"
      - "priority::critical"
      - "type::bug"
      - "area::frontend"
    description: |
      The library lists all experiences including drafts with no visual indicator
      on the card. The Draft badge exists on ExperienceDetail but not on library
      cards, so users cannot tell which experiences are unpublished from the library view.

      File: frontend/src/components/ExperienceLibraryCard.tsx (or equivalent card component)

      Fix
      - Add a Draft badge to experience cards when is_draft is true
      - Match the badge style used in ExperienceDetail (small rounded pill, muted color)

      Tests to verify
      - [ ] Create a draft experience and confirm a Draft badge appears on its library card
      - [ ] Publish an experience and confirm the badge disappears
      - [ ] Confirm published experiences show no badge

